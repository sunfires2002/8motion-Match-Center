<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8motion MATCH CENTER 管理画面</title>
  <style>
    :root {
      --bg: #050706;
      --panel: #101412;
      --panel-2: #171d1a;
      --line: #2a342f;
      --text: #f5fff9;
      --muted: #aab8b0;
      --green: #00a84f;
      --green-2: #19d36c;
      --danger: #ff5d5d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(0, 168, 79, .16), transparent 34rem), var(--bg);
      color: var(--text);
      font-family: Inter, "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      letter-spacing: 0;
    }

    button, input, textarea { font: inherit; }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(5, 7, 6, .9);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      backdrop-filter: blur(14px);
    }

    .topbar {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 48px;
      height: 56px;
      object-fit: contain;
    }

    .logo-type {
      display: block;
      color: #fff;
      font-size: clamp(1.5rem, 4vw, 2.15rem);
      font-weight: 1000;
      line-height: .9;
      text-transform: lowercase;
      text-shadow: 2px 0 0 #000, -2px 0 0 #000, 0 2px 0 #000, 0 -2px 0 #000, 0 4px 0 rgba(0, 168, 79, .82);
    }

    .sub {
      display: block;
      margin-top: 4px;
      color: var(--green-2);
      font-size: .75rem;
      font-weight: 1000;
      text-transform: uppercase;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 7px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      cursor: pointer;
      font-weight: 1000;
    }

    .btn.primary {
      background: var(--green-2);
      border-color: var(--green-2);
      color: #041308;
    }

    .btn.danger {
      background: rgba(255, 93, 93, .14);
      border-color: rgba(255, 93, 93, .42);
    }

    main { padding: 24px 0 44px; }

    .intro, .panel {
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(18, 24, 21, .9), rgba(7, 11, 9, .96));
    }

    .intro {
      padding: 18px;
      margin-bottom: 18px;
    }

    .intro h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 5vw, 3rem);
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 5px 0 rgba(0, 168, 79, .5);
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 18px;
      align-items: start;
    }

    .tabs {
      position: sticky;
      top: 96px;
      display: grid;
      gap: 8px;
    }

    .tab {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 7px;
      background: rgba(255, 255, 255, .04);
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      font-weight: 1000;
    }

    .tab.active {
      background: var(--green-2);
      border-color: var(--green-2);
      color: #041308;
    }

    .panel { overflow: hidden; }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 1.3rem;
      text-transform: uppercase;
    }

    .panel-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;
    }

    input, textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(0, 0, 0, .28);
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus, textarea:focus {
      border-color: var(--green-2);
      box-shadow: 0 0 0 3px rgba(25, 211, 108, .14);
    }

    .rows {
      display: grid;
      gap: 12px;
    }

    .row-card {
      display: grid;
      gap: 12px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 8px;
      background: rgba(255, 255, 255, .04);
    }

    .row-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .status {
      min-height: 1.2em;
      color: var(--green-2);
      font-size: .86rem;
      font-weight: 900;
    }

    .hidden { display: none; }

    .preview-frame {
      width: 100%;
      height: 540px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 0;
      }

      .toolbar { justify-content: flex-start; }

      .layout { grid-template-columns: 1fr; }

      .tabs {
        position: static;
        display: flex;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .tab {
        width: auto;
        white-space: nowrap;
      }

      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div class="brand">
        <img src="logo.png" alt="8motion">
        <span>
          <span class="logo-type">8motion</span>
          <span class="sub">Match Center Admin</span>
        </span>
      </div>
      <div class="toolbar">
        <button class="btn" type="button" id="previewBtn">プレビュー更新</button>
        <button class="btn" type="button" id="jsonBtn">JSON保存</button>
        <label class="btn">JSON読込<input id="jsonFile" type="file" accept="application/json" hidden></label>
        <button class="btn primary" type="button" id="exportBtn">公開HTMLを書き出す</button>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="intro">
        <h1>管理画面</h1>
        <p>入力内容はこのブラウザに自動保存されます。「公開HTMLを書き出す」で生成したindex.htmlをGitHub Pagesに配置してください。</p>
      </section>

      <div class="layout">
        <nav class="tabs" aria-label="編集メニュー">
          <button class="tab active" type="button" data-tab="basic">基本情報</button>
          <button class="tab" type="button" data-tab="videos">試合動画</button>
          <button class="tab" type="button" data-tab="standings">順位表</button>
          <button class="tab" type="button" data-tab="players">個人成績</button>
          <button class="tab" type="button" data-tab="activity">チーム活動</button>
          <button class="tab" type="button" data-tab="preview">プレビュー</button>
        </nav>

        <div>
          <section class="panel tab-panel" data-panel="basic">
            <div class="panel-head"><h2>基本情報</h2><span class="status" id="status"></span></div>
            <div class="panel-body">
              <div class="grid">
                <label>サイト説明<textarea data-bind="hero.copy"></textarea></label>
                <label>次節情報<textarea data-bind="next.description"></textarea></label>
                <label>次節日付<input data-bind="next.date"></label>
                <label>次節タグ（カンマ区切り）<input data-bind="next.tagsText"></label>
              </div>
              <div class="grid">
                <label>自チーム<input data-bind="latest.home"></label>
                <label>相手チーム<input data-bind="latest.away"></label>
                <label>自チーム得点<input data-bind="latest.homeScore" type="number"></label>
                <label>相手得点<input data-bind="latest.awayScore" type="number"></label>
                <label>試合日 / 種別<input data-bind="latest.meta"></label>
                <label>最新動画タイトル<input data-bind="latest.videoTitle"></label>
                <label>最新動画説明<textarea data-bind="latest.videoDescription"></textarea></label>
                <label>最新動画サムネイル画像URL<input data-bind="latest.thumbnailUrl"></label>
                <label>前半動画URL / YouTube URL<input data-bind="latest.firstHalfUrl"></label>
                <label>後半動画URL / YouTube URL<input data-bind="latest.secondHalfUrl"></label>
                <label>PULSE ECHO URL<input data-bind="latest.pulseUrl"></label>
              </div>
            </div>
          </section>

          <section class="panel tab-panel hidden" data-panel="videos">
            <div class="panel-head"><h2>試合動画</h2><button class="btn primary" type="button" data-add="videos">追加</button></div>
            <div class="panel-body rows" id="videosRows"></div>
          </section>

          <section class="panel tab-panel hidden" data-panel="standings">
            <div class="panel-head"><h2>順位表</h2><button class="btn primary" type="button" data-add="standings">追加</button></div>
            <div class="panel-body rows" id="standingsRows"></div>
          </section>

          <section class="panel tab-panel hidden" data-panel="players">
            <div class="panel-head"><h2>個人成績</h2><button class="btn primary" type="button" data-add="players">追加</button></div>
            <div class="panel-body rows" id="playersRows"></div>
          </section>

          <section class="panel tab-panel hidden" data-panel="activity">
            <div class="panel-head"><h2>チーム活動</h2><button class="btn primary" type="button" data-add="activity">追加</button></div>
            <div class="panel-body rows" id="activityRows"></div>
          </section>

          <section class="panel tab-panel hidden" data-panel="preview">
            <div class="panel-head"><h2>プレビュー</h2><button class="btn" type="button" id="previewBtn2">更新</button></div>
            <div class="panel-body"><iframe class="preview-frame" id="preview" title="公開ページプレビュー"></iframe></div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "eightmotion_match_center_admin_v1";

    const defaultData = {
      hero: {
        copy: "試合結果、最新の試合動画、個人成績、チーム活動をまとめて確認できる8motion公式レコードページ。"
      },
      latest: {
        home: "8motion",
        away: "RIVAL FC",
        homeScore: 4,
        awayScore: 2,
        meta: "2026.06.21 / League",
        videoTitle: "8motion 4 - 2 RIVAL FC / 前半・後半",
        videoDescription: "前後半の流れ、得点シーン、試合後の振り返りまで確認できる最新試合動画。",
        thumbnailUrl: "",
        firstHalfUrl: "#",
        secondHalfUrl: "#",
        pulseUrl: "#"
      },
      next: {
        date: "06.28",
        description: "20:00 Kickoff\nvs GREEN UNITED\n会場: 8motion Arena",
        tagsText: "League, Home"
      },
      videos: [
        { title: "Round 5 前半", detail: "vs BLUE LOCKS", url: "#", thumbnailUrl: "" },
        { title: "Round 5 後半", detail: "vs BLUE LOCKS", url: "#", thumbnailUrl: "" }
      ],
      standings: [
        { rank: 1, team: "8motion", pts: 15 },
        { rank: 2, team: "GREEN UNITED", pts: 12 },
        { rank: 3, team: "RIVAL FC", pts: 9 }
      ],
      players: [
        { player: "Yuto", record: "Goals", total: 8 },
        { player: "Kei", record: "Assists", total: 6 },
        { player: "Ryo", record: "MVP", total: 3 }
      ],
      activity: [
        { title: "6月リーグ第5節を更新", body: "試合結果と最新動画を公開しました。", imageUrl: "" },
        { title: "体験参加受付中", body: "次回トレーニングの参加希望を受け付けています。", imageUrl: "" }
      ]
    };

    let data = loadData();

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function loadData() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? mergeData(clone(defaultData), JSON.parse(saved)) : clone(defaultData);
      } catch {
        return clone(defaultData);
      }
    }

    function mergeData(base, saved) {
      return {
        ...base,
        ...saved,
        hero: { ...base.hero, ...(saved.hero || {}) },
        latest: { ...base.latest, ...(saved.latest || {}) },
        next: { ...base.next, ...(saved.next || {}) },
        videos: Array.isArray(saved.videos) ? saved.videos : base.videos,
        standings: Array.isArray(saved.standings) ? saved.standings : base.standings,
        players: Array.isArray(saved.players) ? saved.players : base.players,
        activity: Array.isArray(saved.activity) ? saved.activity : base.activity
      };
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setStatus("保存しました");
    }

    function setStatus(text) {
      const status = $("#status");
      if (!status) return;
      status.textContent = text;
      clearTimeout(setStatus.timer);
      setStatus.timer = setTimeout(() => status.textContent = "", 1600);
    }

    function getPath(path) {
      return path.split(".").reduce((obj, key) => obj && obj[key], data);
    }

    function setPath(path, value) {
      const keys = path.split(".");
      const last = keys.pop();
      const target = keys.reduce((obj, key) => obj[key], data);
      target[last] = value;
    }

    function syncBoundFields() {
      $$("[data-bind]").forEach((field) => {
        field.value = getPath(field.dataset.bind) ?? "";
        field.addEventListener("input", () => {
          setPath(field.dataset.bind, field.type === "number" ? Number(field.value) : field.value);
          saveData();
        });
      });
    }

    function syncCurrentValues() {
      $$("[data-bind]").forEach((field) => field.value = getPath(field.dataset.bind) ?? "");
    }

    function renderRows() {
      renderList("videos", $("#videosRows"), [
        ["タイトル", "title"],
        ["説明", "detail"],
        ["URL", "url"],
        ["サムネイル画像URL", "thumbnailUrl"]
      ]);
      renderList("standings", $("#standingsRows"), [
        ["順位", "rank", "number"],
        ["チーム", "team"],
        ["勝点", "pts", "number"]
      ]);
      renderList("players", $("#playersRows"), [
        ["選手", "player"],
        ["項目", "record"],
        ["合計", "total", "number"]
      ]);
      renderList("activity", $("#activityRows"), [
        ["タイトル", "title"],
        ["本文", "body", "textarea"],
        ["写真URL", "imageUrl"]
      ]);
    }

    function renderList(key, container, fields) {
      container.innerHTML = "";
      data[key].forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "row-card";
        const grid = document.createElement("div");
        grid.className = "grid";

        fields.forEach(([label, prop, type]) => {
          const field = document.createElement("label");
          const value = item[prop] ?? "";
          if (type === "textarea") {
            field.innerHTML = `${escapeHtml(label)}<textarea>${escapeHtml(value)}</textarea>`;
            $("textarea", field).addEventListener("input", (event) => updateItem(key, index, prop, event.target.value));
          } else {
            field.innerHTML = `${escapeHtml(label)}<input type="${type === "number" ? "number" : "text"}" value="${escapeAttr(value)}">`;
            $("input", field).addEventListener("input", (event) => updateItem(key, index, prop, type === "number" ? Number(event.target.value) : event.target.value));
          }
          grid.appendChild(field);
        });

        const actions = document.createElement("div");
        actions.className = "row-actions";
        actions.innerHTML = '<button class="btn danger" type="button">削除</button>';
        $("button", actions).addEventListener("click", () => {
          data[key].splice(index, 1);
          saveData();
          renderRows();
        });

        card.append(grid, actions);
        container.appendChild(card);
      });
    }

    function updateItem(key, index, prop, value) {
      data[key][index][prop] = value;
      saveData();
    }

    function addItem(key) {
      const item = {
        videos: { title: "New Video", detail: "vs Opponent", url: "#", thumbnailUrl: "" },
        standings: { rank: data.standings.length + 1, team: "Team", pts: 0 },
        players: { player: "Player", record: "Goals", total: 0 },
        activity: { title: "新しい活動", body: "内容を入力してください。", imageUrl: "" }
      }[key];
      data[key].push(item);
      saveData();
      renderRows();
    }

    function switchTab(name) {
      $$(".tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === name));
      $$(".tab-panel").forEach((panel) => panel.classList.toggle("hidden", panel.dataset.panel !== name));
      if (name === "preview") updatePreview();
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function saveJson() {
      download("8motion-match-center-data.json", JSON.stringify(data, null, 2), "application/json");
    }

    function importJson(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          data = mergeData(clone(defaultData), JSON.parse(reader.result));
          saveData();
          syncCurrentValues();
          renderRows();
          updatePreview();
        } catch {
          alert("JSONを読み込めませんでした。");
        }
      };
      reader.readAsText(file);
    }

    function updatePreview() {
      $("#preview").srcdoc = buildPublicHtml(data);
    }

    function exportHtml() {
      download("index.html", buildPublicHtml(data), "text/html");
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeHtml(value) { return esc(value); }
    function escapeAttr(value) { return esc(value); }
    function nl2br(value) { return esc(value).replace(/\n/g, "<br>"); }

    function imageTag(url, className, alt) {
      if (!url) return "";
      return `<img${className ? ` class="${escapeAttr(className)}"` : ""} src="${escapeAttr(url)}" alt="${escapeAttr(alt || "")}" loading="lazy">`;
    }

    function youtubeEmbedUrl(url) {
      const value = String(url || "").trim();
      if (!value || value === "#") return "";
      const rawId = value.match(/^[a-zA-Z0-9_-]{11}$/);
      if (rawId) return `https://www.youtube.com/embed/${rawId[0]}`;
      const patterns = [
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/watch\?[^#]*v=([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
      ];
      for (const pattern of patterns) {
        const match = value.match(pattern);
        if (match) return `https://www.youtube.com/embed/${match[1]}`;
      }
      return "";
    }

    function videoHero(url, thumbnailUrl, title) {
      const embedUrl = youtubeEmbedUrl(url);
      if (embedUrl) {
        return `<div class="video-thumb is-embed"><iframe class="video-embed" src="${escapeAttr(embedUrl)}" title="${escapeAttr(title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe></div>`;
      }
      return `<a href="${escapeAttr(url || "#")}" class="video-thumb" aria-label="最新試合動画を再生">${imageTag(thumbnailUrl, "video-photo", title)}<span class="play"></span></a>`;
    }

    function buildPublicHtml(site) {
      const tags = String(site.next.tagsText || "").split(",").map((tag) => tag.trim()).filter(Boolean);
      const pills = tags.map((tag) => `<span class="pill">${esc(tag)}</span>`).join("");
      const videoItems = site.videos.map((video) => `
                  <a class="video-item" href="${escapeAttr(video.url || "#")}">
                    <span class="video-mini-thumb">${imageTag(video.thumbnailUrl, "", video.title)}</span>
                    <span><strong>${esc(video.title)}</strong><span>${esc(video.detail)}</span></span>
                  </a>`).join("");
      const standings = site.standings.map((row) => `<tr><td>${esc(row.rank)}</td><td>${esc(row.team)}</td><td>${esc(row.pts)}</td></tr>`).join("");
      const players = site.players.map((row) => `<tr><td>${esc(row.player)}</td><td>${esc(row.record)}</td><td>${esc(row.total)}</td></tr>`).join("");
      const activities = site.activity.map((item) => `<div class="activity-item"><span class="activity-photo">${imageTag(item.imageUrl, "", item.title)}</span><span class="activity-text"><strong>${esc(item.title)}</strong><span>${esc(item.body)}</span></span></div>`).join("");

      return `<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>8motion MATCH CENTER</title>
  <meta name="description" content="8motionの試合結果、試合動画、個人成績、チーム活動をまとめたMATCH CENTER。">
  <style>${publicCss()}</style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="wrap nav">
        <a class="brand" href="#top" aria-label="8motion MATCH CENTER">
          <img src="logo.png" alt="8motion">
          <span class="brand-title"><span class="logo-type">8motion</span><span class="brand-kicker">Match Center</span></span>
        </a>
        <nav class="nav-links" aria-label="主要メニュー">
          <a href="#videos">試合動画</a><a href="#results">試合結果</a><a href="#stats">個人成績</a><a href="#activity">チーム活動</a>
        </nav>
      </div>
    </header>
    <main id="top">
      <section class="hero">
        <div class="wrap hero-grid">
          <div class="hero-main">
            <p class="section-label">Team record room</p>

            <p class="hero-copy">${esc(site.hero.copy)}</p>
            <div class="latest-score">
              <div class="team"><span class="team-name">${esc(site.latest.home)}</span><span class="team-meta">Latest Match</span></div>
              <div class="score">${esc(site.latest.homeScore)} <small>-</small> ${esc(site.latest.awayScore)}</div>
              <div class="team"><span class="team-name">${esc(site.latest.away)}</span><span class="team-meta">${esc(site.latest.meta)}</span></div>

          </div>

      <section class="section" id="videos">

                <h3>${esc(site.latest.videoTitle)}</h3>
                <p>${esc(site.latest.videoDescription)}</p>
                <div class="actions">
                  <a class="btn primary" href="${escapeAttr(site.latest.firstHalfUrl || site.latest.fullUrl || "#")}">前半動画</a>
                  <a class="btn" href="${escapeAttr(site.latest.secondHalfUrl || "#")}">後半動画</a>
                  <a class="btn" href="${escapeAttr(site.latest.pulseUrl || "#")}">PULSE ECHOで観る</a>
                </div>
              </div>
            </article>
            <div class="side-stack">
              <aside class="panel mini-panel">
                <p class="section-label">PULSE ECHO</p>
                <h3>Watch & Tap</h3>
                <p>動画を観ながら「ここ！」と思った瞬間にボタンを押して、あとからその場面に戻れます。</p>
                <div class="echo-buttons"><button type="button">熱狂</button><button type="button">ナイス</button><button type="button">改善</button></div>
              </aside>
              <aside class="panel mini-panel">
                <p class="section-label">Video Archive</p>
                <div class="video-list">${videoItems}</div>
              </aside>
            </div>
          </div>
        </div>
      </section>
      <section class="section" id="results">
        <div class="wrap grid-3">
          <article class="panel mini-panel"><p class="section-label">League Table</p><h3>順位表</h3><table class="table"><thead><tr><th>#</th><th>Team</th><th>Pts</th></tr></thead><tbody>${standings}</tbody></table></article>
          <article class="panel mini-panel" id="stats"><p class="section-label">Player Stats</p><h3>個人成績</h3><table class="table"><thead><tr><th>Player</th><th>Record</th><th>Total</th></tr></thead><tbody>${players}</tbody></table></article>
          <article class="panel mini-panel" id="activity"><p class="section-label">Team Activity</p><h3>チーム活動</h3><div class="activity">${activities}</div></article>
        </div>
      </section>
    </main>
    <footer class="footer"><div class="wrap">© 8motion MATCH CENTER</div></footer>
  </div>
</body>
</html>`;

    $$(".tab").forEach((tab) => tab.addEventListener("click", () => switchTab(tab.dataset.tab)));

    $("#previewBtn2").addEventListener("click", updatePreview);
